<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Radio wave rings -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#wave)" stroke-width="3" opacity="0.2"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="url(#wave)" stroke-width="4" opacity="0.4"/>
  <circle cx="256" cy="256" r="80" fill="none" stroke="url(#wave)" stroke-width="6" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="256" cy="256" r="32" fill="url(#wave)"/>
  <!-- Signal arcs -->
  <path d="M 176 256 A 80 80 0 0 1 256 176" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <path d="M 256 336 A 80 80 0 0 1 176 256" fill="none" stroke="url(#wave)" stroke-width="8" stroke-linecap="round" opacity="0.9"/>
  <!-- Pulse dot top-right -->
  <circle cx="380" cy="132" r="8" fill="#10b981">
    <animate attributeName="opacity" values="1;0.3;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
